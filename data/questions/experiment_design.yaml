- id: pit_postlaunch_01
  topic: Design
  theme: Post-launch / Validity
  difficulty: 3
  category: "Experiment Design"
  question: We ran an A/B test. Test won, so we made the change on the site for
    all users. After some time, the new version is not performing better than
    the old one. What could be the reason? Assume there was no technical or
    statistical problem with the test; the reason has to do with user behavior.
  reference_answer: |
    The main reason is novelty effect. When a site adds a small new feature,
    users at first engage with it a lot out of curiosity. As novelty wears off,
    they return to normal behavior. This hurts test reliability, since tests
    measure impact over a short period and extrapolate to the long run.

    As a DS, validate with data. A good proxy for novelty effect:
    - Restrict to users for whom it was the first experience on the site (first-time
      users are not affected by novelty).
    - Compare test results: new users in control vs new users in test.
    - If the test wins overall but does not win for the new-user subset, that is
      a strong warning of novelty effect—especially when we already see no
      improvement after full rollout.
    Comparing new vs old users can also give an estimate of the novelty effect
    and be used to control for it in future tests.
  tags:
  - post_launch
  - novelty
  - interference
  - selection
  - validity
