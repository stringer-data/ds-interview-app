- id: def_type1_type2_tradeoff_01
  topic: Interpretation
  theme: Power & Errors
  difficulty: 3
  category: "Hypothesis Testing"
  question: Describe what Type I and Type II errors are, and the trade-off between
    them.
  reference_answer: |
    Both errors are relevant in the context of hypothesis testing. Type I error
    is when one rejects the null hypothesis when it is correct, and is known as
    a false positive. Type II error is when the null hypothesis is not rejected
    when the alternative hypothesis is correct; this is known as a false
    negative. In layman's terms, a Type I error is when we detect a difference
    when in reality there is no significant difference in the experiment.
    Similarly, a Type II error occurs when we fail to detect a difference, when
    in reality there is a significant difference in an experiment.

    Type I error is given by the level of significance alpha; Type II error is
    given by beta. Usually 1-alpha is referred to as the confidence level,
    and 1-beta is referred to as the statistical power of the test. In any
    well-conducted statistical procedure we want both alpha and beta to be
    small. However, based on the definition of the two, it is impossible to
    make both errors small simultaneously.
  tags:
  - type1
  - type2
  - errors
  - tradeoff
