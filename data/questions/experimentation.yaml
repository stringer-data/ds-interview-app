- id: design_itt_01
  topic: Experimentation
  theme: A/B Fundamentals
  difficulty: 1
  category: A/B Testing Mechanics
  question: What is ITT and what does it measure in an experiment?
  reference_answer: >
    Intent-to-Treat (ITT) measures the causal effect of being assigned to the
    treatment group versus the control group, regardless of whether participants
    actually receive or comply with the treatment.
  tags:
    - itt
    - intent_to_treat
    - experiment
    - causal
- id: design_itt_02
  topic: Experimentation
  theme: A/B Fundamentals
  difficulty: 2
  category: A/B Testing Mechanics
  question: Why does ITT include users who never saw the treatment?
  reference_answer: >
    Because excluding them would break randomization and introduce selection bias.
  tags:
