    - randomization
    - selection_bias
- id: design_itt_03
  topic: Experimentation
  theme: A/B Fundamentals
  difficulty: 3
  category: A/B Testing Mechanics
  question: A company randomizes users into a new checkout flow, but 20 percent of treated users never load the page. Should those users be included in the analysis?
  reference_answer: >
    Yes, because the ITT estimate compares all assigned users and preserves randomization.
  tags:
