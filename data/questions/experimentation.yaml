- id: interp_coin_fair_01
  topic: Experimentation
  theme: Hypothesis Testing
  difficulty: 3
  category: Hypothesis Testing
  question: You flip a coin 10 times and observe only one heads. What would be
    your null hypothesis and p-value for testing whether the coin is fair?
  reference_answer: |
    The null hypothesis is that the coin is fair and the alternative hypothesis
    is that the coin is biased to tails. (Note that this is a one-sided test.)

    Since the sample size here is 10, you cannot apply the central limit
    theorem (and so you cannot approximate a binomial using a normal
    distribution).

    The p-value here is the probability of observing the results obtained
    given that the null hypothesis is true, i.e. under the assumption that the
    coin is fair. In total for 10 flips of a coin, there are 2^10 = 1024
    possible outcomes, and in only 10 of these are there 9 tails and one head.
    Hence the exact probability of the given result is the p-value, which is
    10/1024. Therefore, with a significance level set, for example, at 0.05,
    we can reject the null hypothesis.
  tags:
    - null_hypothesis
    - pvalue
    - binomial
    - fairness
