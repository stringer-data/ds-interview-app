- id: design_itt_04
  topic: Experimentation
  theme: A/B Fundamentals
  difficulty: 3
  category: A/B Testing Mechanics
  question: In a push notification experiment, some users assigned to treatment have notifications disabled. Should they be excluded?
  reference_answer: >
    No, because excluding them would introduce bias. They remain part of the ITT estimate.
