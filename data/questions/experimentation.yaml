- id: case_fb_engagement_01
  topic: Experimentation
  theme: Engagement
  difficulty: 5
  category: Experimentation Strategy
  question: How would you improve engagement on Facebook?
  reference_answer: >
    There are two valid routes: (1) Analyze more—build models, find segments,

    infer what might work from data. (2) Try things out—form hypotheses, run

    experiments (A/B tests), ship and see what works. You can use one or both;

    the template below is the "analyze" route; the "experiment" route is

    equally valid (metric → hypotheses → design tests → iterate).


    1. Define the metric. Pretty much all case studies start with a vague goal;
       the first step is translating that into a metric that can be optimized.
       E.g. "I define engagement on FB as the proportion of users who take at
       least one action per day, where action means interacting with the site
       (posting, liking, uploading a picture, etc.)." As long as it makes
       sense, the exact definition (thresholds, which actions, or avg actions
       per user vs. pct above threshold) matters less than having a concrete,
       evaluable metric. Tie the metric to company mission (FB = interactions;
       Quora = quality content; Airbnb = belonging anywhere).

    2. Pick the variables you think would matter to move that metric. Usually
       a combination of user characteristics (sex, age, country, # of friends)
       and browsing/online behavior (device, traffic source, session time, etc.).

    3. Pick a model to predict the metric from those variables. Tree-based
       classifiers (e.g. Random Forest) are often a good choice; justify (e.g.
       high dimension, categoricals, outliers). Get insights via partial
       dependence and variable importance.

    4. Come up with a couple of example segments from the model—one "good" and
       one "bad" (e.g. users from Argentina less engaged; young Indians highly
       engaged but under-represented). Use product knowledge to make them
       realistic; otherwise make them actionable and note that with real data
       you'd find the actual segments.

    5. Define next steps. E.g. check Spanish localization for Argentina; tell
       marketing to reach more young Indian users. Always end with actionable
       next steps to improve the metric. With minor changes, this template
       works for most "How do you increase X on site Y?" case studies.
  tags:
    - engagement
    - product_sense
    - framework
- id: case_ebay_fake_01
  topic: Experimentation
  theme: Trust & Safety / Fraud
  difficulty: 5
  category: Experimentation Strategy
  question: Which variables are important to predict a fake listing on eBay?
  reference_answer: |
    General advice for fraud:
    - Fraudsters rarely commit just one fraud; they scale once a strategy works.
      To do that they need new accounts, so variables that should be unique per
      user but can be tracked across IDs are very useful: device ID, IP address,
      physical address, credit card number, etc. They allow tracking the same
      user across different profiles.
    - Most users are not fraudulent, so looking at variable distributions and
      outliers (anomalies) is a good strategy to flag suspect behavior. In
      practice, variables are about "something that should be unique and is
      not" or "extreme values."

    For a peer-to-peer marketplace like eBay, break the answer into: (1)
    characteristics of the listing and (2) characteristics of the seller.

    Listing: picture quality (e.g. very low resolution); whether the image is
    original or taken from the internet (image search / similarity); price
    (especially if too low); description text (e.g. same wording as other
    listings).

    Seller: device ID, IP, bank/PayPal account, any sign-up PII—check if
    matchable to other sellers; ratings (especially no ratings + brand-new
    account); browsing behavior before/after account creation. A new seller
    is expected to spend time on the site learning how it works; one who
    behaves like an expert immediately is suspect.
  tags:
    - fraud
    - trust_safety
    - prediction
    - feature_importance
- id: case_fraud_threshold_01
  topic: Experimentation
  theme: Trust & Safety / Fraud
  difficulty: 5
  category: Experimentation Strategy
  question: |
    You are a data scientist working on fraud detection for a payment platform.
    A new machine learning model flags transactions as fraudulent or legitimate.
    The current model has the following performance:

    Metric                    | Value
    Sensitivity (Recall)      | 92%
    Specificity              | 70%

    Additional context:
    - 1% of all transactions are actually fraudulent.
    - When fraud is missed, the average loss is $120.
    - When a legitimate transaction is incorrectly flagged, the user must go
      through a manual verification flow that causes friction and drop-off
      worth an estimated $8 cost to the company.

    Your product manager asks: "Can we increase the fraud detection threshold
    to improve specificity? Customers are complaining about legitimate
    transactions getting blocked."

    How would you respond? Should you increase the threshold?
  follow_ups:
    - case_fraud_threshold_01_sens_spec
    - case_fraud_threshold_01_evaluate
    - case_fraud_threshold_01_daily_cost
  reference_answer: |
    Key points:
    - Raising the threshold (flag fewer as fraud) increases specificity
      (fewer false positives, fewer legitimate users blocked) but decreases
      sensitivity (more fraud missed).
    - The decision should be driven by expected cost, not just specificity.
      Cost of a missed fraud (FN) = $120; cost of a false flag (FP) = $8.
      With 1% prevalence, the expected cost per transaction depends on how many
      FN vs FP the threshold produces. A back-of-envelope: if the model flags
      too many today (70% specificity means 30% of legitimate tx flagged),
      FP cost can dominate in volume; raising threshold reduces FP and may
      reduce total cost even if some fraud is missed.
    - Candidate should either (1) reason about the tradeoff and cost ratio
      (120 vs 8 and prevalence), or (2) suggest computing expected cost at
      current vs higher threshold using the model's score distribution, or
      (3) note that the answer depends on the exact ROC/score distribution
      and recommend evaluating expected cost at different thresholds.
    - Saying "yes, increase threshold to reduce customer friction" or "no,
      we'll miss more fraud" without considering the cost balance is partial;
      the strong answer ties threshold choice to expected cost and possibly
      recommends a sensitivity analysis or A/B test on threshold.
  tags:
    - fraud
    - threshold
    - sensitivity
    - specificity
    - cost_sensitive
    - classification
- id: case_fraud_threshold_01_sens_spec
  topic: Experimentation
  theme: Trust & Safety / Fraud
  difficulty: 5
  category: Experimentation Strategy
  question: >
    Explain in your own words the difference between Sensitivity and
    Specificity.

    Why do these two metrics typically move in opposite directions?
  reference_answer: |
    Sensitivity (recall) = proportion of actual positives that the model
    correctly flags (TP / (TP + FN)). For fraud: of all true fraud, what % do
    we catch? Specificity = proportion of actual negatives correctly identified
    as negative (TN / (TN + FP)). For fraud: of all legitimate transactions,
    what % do we leave alone?

    They move in opposite directions because both are determined by the same
    decision threshold. Raising the threshold (flag fewer as positive):
    fewer TP and more FN → sensitivity goes down; fewer FP and more TN →
    specificity goes up. Lowering the threshold: more TP, fewer FN →
    sensitivity goes up; more FP, fewer TN → specificity goes down. So
    sensitivity and specificity trade off as you move the threshold along
    the ROC curve.
  tags:
    - sensitivity
    - specificity
    - classification
    - threshold
- id: case_fraud_threshold_01_evaluate
  topic: Experimentation
  theme: Trust & Safety / Fraud
  difficulty: 5
  category: Experimentation Strategy
  question: |
    Should we increase the threshold? Describe how you would evaluate this
    decision quantitatively.
  reference_answer: |
    Evaluate by expected cost (or profit) at different thresholds.

    1. For each candidate threshold, use the model's score distribution (on a
       validation set or recent data) to estimate: (a) how many transactions
       are flagged vs not, (b) implied TP, FP, FN, TN given the known/labeled
       prevalence (or use calibrated probabilities). Alternatively, use the
       ROC curve and prevalence to get FP rate and FN rate at each threshold.

    2. Compute expected cost per transaction (or total): Cost = (FN count ×
       $120) + (FP count × $8). Or per-decision: P(fraud)×(1−sensitivity)×120
       + P(legit)×(1−specificity)×8 at that threshold.

    3. Choose the threshold that minimizes expected cost. Compare current
       threshold vs higher threshold; if expected cost drops when you raise
       the threshold, recommend increasing it; otherwise recommend keeping or
       lowering. Optionally run a sensitivity analysis on the cost assumptions
       ($120, $8) and prevalence.
  tags:
    - threshold
    - expected_cost
    - fraud
    - classification
- id: case_fraud_threshold_01_daily_cost
  topic: Experimentation
  theme: Trust & Safety / Fraud
  difficulty: 5
  category: Experimentation Strategy
  question: >
    Assume 1M transactions per day. Estimate the daily cost of the current
    model.

    What additional information would help you make a better decision?
  reference_answer: |
    Daily cost estimate (with 1% fraud, 92% sensitivity, 70% specificity):
    - True fraud: 1% × 1M = 10,000. Missed (FN): 8% × 10,000 = 800. FN cost:
      800 × $120 = $96,000.
    - Legitimate: 990,000. False positives: (1 − 0.70) × 990,000 = 297,000. FP
      cost: 297,000 × $8 = $2,376,000.
    - Total daily cost ≈ $96,000 + $2,376,000 = $2,472,000. (FP cost dominates
      because of volume and 30% FP rate.)

    Additional information that would help: (1) Full ROC or score distribution
    so we can compute cost at other thresholds; (2) confidence in the $120 and
    $8 cost estimates (sensitivity analysis); (3) whether prevalence or costs
    vary by segment; (4) capacity constraints on manual review; (5) long-term
    impact of friction (e.g. churn) beyond the $8; (6) labeled validation data
    to confirm sensitivity/specificity at the current threshold.
  tags:
    - fraud
    - expected_cost
    - estimation
    - classification
