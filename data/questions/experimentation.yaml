    is from the mean. Formula: z = (x - μ) / σ (or use sample mean and SD).
    It standardizes values so they can be compared across different scales;
    z = 0 is the mean, z = ±1 is one SD away. Used in normality, hypothesis
    tests, and identifying outliers.
