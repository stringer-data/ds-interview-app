- id: design_exp_sample_size_01
  topic: Experimentation
  theme: A/B Fundamentals
  difficulty: 3
  dimension: math
  category: Experiment Design
  question: >
    Baseline conversion rate is 10 percent.

    You want to detect a plus 1 percent absolute lift with alpha 0.05 and power
    80 percent.

    Roughly how many users per group do you need?
  reference_answer: >
    For a binary conversion metric the variance is p times (1 minus p). With a
    baseline

    of 10 percent the variance is about 0.09. A rough rule of thumb is that
    detecting

    a one percentage point absolute lift at this baseline requires on the order
    of about

    15k to 25k users per group.
  tags:
    - sample_size
    - power
    - conversion
    - mde
- id: design_exp_sample_size_02
  topic: Experimentation
  theme: A/B Fundamentals
  difficulty: 3
  category: Experiment Design
  question: |
    An experiment requires 40k users per group to detect a 2 percent lift.
    How many users would you need to detect a 1 percent lift?
  reference_answer: >
    Sample size scales with one over the effect squared. If the effect is cut in
    half

    from 2 percent to 1 percent the required sample size increases by about four
    times.

    So it would be roughly 160k users per group.
  tags:
    - sample_size
    - power
    - mde
    - scaling
- id: design_exp_duration_01
  topic: Experimentation
  theme: A/B Fundamentals
  difficulty: 3
  category: Experiment Design
  question: |
    An experiment requires 200k users per group.
    Daily traffic is 50k users and the experiment splits traffic 50/50.
    How long will the experiment run?
  reference_answer: >
    Each group gets 25k users per day. To reach 200k users per group it takes
    200k

    divided by 25k which equals about 8 days. In practice you would often run
    about

    one to two weeks to cover weekly patterns.
  tags:
    - duration
    - sample_size
    - traffic
