- id: metrics_airbnb_success_01
  topic: Metrics
  theme: Metric Choice
  difficulty: 3
  dimension: strategy
  category: Product Metrics
  question: What metrics define success for Airbnb?
  reference_answer: |
    Good answers include:

    Guest metrics: booking conversion rate, search → booking funnel, nights
    booked, guest retention.

    Host metrics: listing activation, host supply growth, listing availability.

    Marketplace health: supply/demand balance, search success rate, booking
    latency.
  tags:
    - product_metrics
    - marketplace
    - airbnb
    - success_metrics
