  theme: Metric Choice
  difficulty: 3
  dimension: strategy
  category: Product Metrics
  question: How would you measure whether Airbnb is successful in Japan?
  reference_answer: |
    Expected thinking:

    Supply: number of active listings, host onboarding rate.

    Demand: guest searches, booking conversion.

    Marketplace: nights booked, occupancy rate.

    Localization: payment success, translation usage, customer support tickets.
  tags:
    - product_metrics
