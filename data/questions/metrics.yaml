- id: interp_metric_drop_01
  topic: Metrics
  theme: Metric Investigation
  difficulty: 5
  dimension: interpretation
  category: Experiment Design
  question: At Facebook we use as a metric number of likes per user per week. We
    check it year over year each week to control for seasonality. This week the
    metric is dramatically down. How would you find out the reason? (Logging is
    fine, as well as the query we used to get the data.)
  reference_answer: >
    Start by breaking the metric into components and analyzing them. Often the

    metric is a proportion and YoY is this year / last year. YoY down can mean

    (1) this year down (numerator down) or (2) last year up (denominator up).

    Don't assume "YoY down" means "this year down"—check both. Then make an

    assumption and follow it (e.g. assume numerator is down).


    Next, decompose further. E.g. likes per user = likes / users. So "numerator

    down" could be: users spiked and new users like less, or users flat and
    likes

    dropped. Assume one (e.g. user spike, likes constant → new users less

    engaged). Then find who the new users are: label "up week" users 1, previous

    week users 0; take behavioral and demographic variables; build a binary

    model (e.g. decision tree) to separate the groups. Splits that create leaves

    with high proportion of 1s describe the extra users (e.g. way more from

    China from a campaign; or many users from few IPs → likely fake accounts).


    Tip: try to land on "user distribution changed, nothing broke on site"—then

    reasons are easy (e.g. marketing in one country, or a competitor there). If

    instead likes actually went down, the most likely reason is a bug; use

    logging and queries to find where.
  tags:
    - metric_investigation
    - debugging
    - logging
    - seasonality
- id: interp_metric_choice_01
  topic: Metrics
  theme: Metric Choice
  difficulty: 3
  dimension: strategy
  category: Experiment Design
  question: Between the following two metrics, which one would you choose to
    measure response time of an inquiry at Airbnb—percentage of responses within
    16 hours, or average response time considering only responses within 16
    hours?
  reference_answer: >
    A good metric is measurable, positively related to behavior you want to

    incentivize, and negatively related to what you want to disincentivize.

    Vanity metrics are bad because they go up regardless and are not

    informative.


    Metrics based on percentages (or percentiles) are usually more robust: they

    are not driven by outliers, and they can include the whole population. Here,

    not all hosts respond. Average response time (only among those within 16h)

    excludes non-responders. Percentage within 16h includes everyone—responders

    and non-responders—so it is evaluable over the full population.


    The average metric has a perverse incentive. Suppose the average (among

    responses within 16h) is 8h. The metric "improves" if hosts who used to

    respond in 12h stop responding (they drop out of the denominator). So

    optimizing for it could mean discouraging hosts from responding if they

    would take longer than the average. Users prefer a response in 12h to no

    response. So percentage within 16h is the better choice.


    Drawback of % within 16h: it does not distinguish 1 min vs 15h—both count as

    success. It pushes for "good enough" (within 16h), not excellence. A common

    approach is to use two metrics with different thresholds (e.g. % within 1h

    for excellence, % within 16h for good enough) and optimize both or ensure
    one

    does not drop when the other improves. Exception: when revenue is driven by

    outliers (e.g. power users in gaming), you may want metrics that are

    sensitive to those outliers.
  tags:
    - metric_choice
    - sla
    - censoring
    - product_metrics
