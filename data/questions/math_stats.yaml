- id: def_zscore_01
  topic: Math/Stats
  theme: Variance
  difficulty: 1
  category: "Probability & Statistics"
  question: What is a z-score?
  reference_answer: |
    A z-score (standard score) is the number of standard deviations a value
    is from the mean. Formula: z = (x - μ) / σ (or use sample mean and SD).
    It standardizes values so they can be compared across different scales;
    z = 0 is the mean, z = ±1 is one SD away. Used in normality, hypothesis
    tests, and identifying outliers.
  tags:
  - z_score
  - variance
  - standardization

- id: pit_multiple_comparisons_01
  topic: Math/Stats
  theme: Multiple testing
  difficulty: 3
  category: "A/B Testing Mechanics"
  question: Your manager reconfigured an A/B test from 2 to 20 different
    variants, while keeping all other parameters unchanged. They come back to
    you that one of the variants is significant. Is this conclusion likely to
    be correct? Why or why not?
  follow_ups:
  - pit_multiple_comparisons_01_correct
  tags:
  - multiple_comparisons
  - type1
  - multiple_testing
- id: pit_multiple_comparisons_01_correct
  topic: Math/Stats
  theme: Multiple testing
  difficulty: 3
  category: "A/B Testing Mechanics"
  question: How would you correct for the multiple comparisons problem when
    running many A/B test variants?
  reference_answer: |
    Adjust the significance threshold to control the overall false positive
    rate. Bonferroni: divide α by the number of tests (e.g. α = 0.05, 19
    variants → threshold 0.05/19 ≈ 0.0026; only consider significant if
    p < this). Bonferroni can be overly conservative and reduce power. False
    Discovery Rate methods (e.g. Benjamini–Hochberg) control the expected
    proportion of false positives while preserving more power. Alternatively,
    redesign: fewer variants, or multi-armed bandit to allocate traffic more
    efficiently.
  tags:
  - multiple_comparisons
  - type1
  - multiple_testing
- id: pit_multiple_bonferroni_01
  topic: Math/Stats
  theme: Multiple testing
  difficulty: 2
  category: "A/B Testing Mechanics"
  question: What is Bonferroni correction and when would you use it?
  reference_answer: |
    Bonferroni correction controls the family-wise error rate when doing
    multiple tests: use a significance threshold of α / n (e.g. α = 0.05,
    n = 20 tests → reject only if p < 0.0025). Use it when you want to be
    conservative and limit the chance of any false positive across the family.
    Drawback: can be very conservative and reduce power when n is large.
  tags:
  - bonferroni
  - multiple_comparisons
- id: pit_multiple_fdr_01
  topic: Math/Stats
  theme: Multiple testing
  difficulty: 3
  category: "A/B Testing Mechanics"
  question: What is FDR (false discovery rate) correction, e.g. Benjamini–Hochberg,
    and how does it differ from Bonferroni?
  reference_answer: |
    FDR methods control the expected proportion of false positives among
    rejections (e.g. 5% of the effects we call significant are false positives),
    rather than the probability of at least one false positive (family-wise).
    Benjamini–Hochberg is a common FDR procedure: order p-values, find the
    largest k such that p_(k) ≤ (k/n)α, reject the first k. Less conservative
    than Bonferroni, so more power when many tests; appropriate when you can
    tolerate some false discoveries.
  tags:
  - fdr
  - benjamini_hochberg
  - multiple_comparisons
- id: pit_multiple_primary_01
  topic: Math/Stats
  theme: Multiple testing
  difficulty: 2
  category: "A/B Testing Mechanics"
  question: Why pre-specify a small set of primary metrics in an experiment,
    and how does that help with multiple comparisons?
  reference_answer: |
    Pre-specifying a small set of primary metrics (e.g. 1–3) limits the number
    of confirmatory tests, so you don't inflate the false positive rate by
    testing many outcomes. You apply your significance threshold only to these;
    other metrics are secondary or exploratory. This is a design-based way to
    avoid the multiple comparisons problem without heavy correction.
  tags:
  - primary_metrics
  - multiple_comparisons
  - pre_specification
- id: pit_multiple_exploratory_01
  topic: Math/Stats
  theme: Multiple testing
  difficulty: 2
  category: "A/B Testing Mechanics"
  question: What does it mean to treat some analyses as exploratory vs
    confirmatory, and why does that matter for multiple comparisons?
  reference_answer: |
    Confirmatory: you pre-specify hypotheses and apply a strict significance
    threshold; you claim statistical significance only there. Exploratory:
    you look at many outcomes or segments without the same guarantee; you
    don't claim strict significance—you generate hypotheses for future tests.
    Treating extra looks as exploratory avoids inflating Type I error while
    still allowing learning.
  tags:
  - exploratory
  - confirmatory
  - multiple_comparisons
