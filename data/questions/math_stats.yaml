  difficulty: 2
  category: "Probability & Statistics"
  question: If your p-value is 0.06 and your significance level is 0.05, what
    do you conclude?
  reference_answer: |
    Expected reasoning: fail to reject the null, not statistically
    significant, does not prove the null is true.
