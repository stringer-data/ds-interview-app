  tags:
  - nominal
  - measurement
  - examples
- id: def_ordinal_data_01
  topic: Math/Stats
  theme: Inference Basics
  difficulty: 1
  category: "Probability & Statistics"
  question: What is ordinal level (ordinal data)?
  reference_answer: |
    A level of measurement characterized by data that can be arranged in some
    order, but differences between data values either cannot be determined or
    are meaningless. Example: course grades A, B, C, D, or F.
  tags:
  - ordinal
  - measurement
  - categorical
