- id: def_statistics_01
  topic: Math/Stats
  theme: Inference Basics
  difficulty: 1
  category: "Probability & Statistics"
  question: What is statistics?
  reference_answer: |
    The science of planning studies and experiments, obtaining data, and then
    organizing, summarizing, presenting, analyzing, interpreting, and drawing
    conclusions based on the data.
  tags:
  - statistics
  - definition
- id: def_nominal_data_01
  topic: Math/Stats
  theme: Inference Basics
  difficulty: 1
  category: "Probability & Statistics"
  question: What is nominal data?
  reference_answer: |
    A level of measurement characterized by data that consist of names, labels,
    or categories only, and the data cannot be arranged in an ordering scheme
    (such as low to high). Example: survey responses of "yes", "no", or
    "undecided".
  tags:
  - nominal
  - measurement
  - categorical
