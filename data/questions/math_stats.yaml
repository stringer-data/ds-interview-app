- id: def_pvalue_01_interpret
  topic: Math/Stats
  theme: Inference Basics
  difficulty: 2
  category: "Probability & Statistics"
  question: If the p-value is 0.03, what does that mean?
  reference_answer: |
    If the null hypothesis were true, there would be a 3% probability of
    observing data at least as extreme as what we saw.
