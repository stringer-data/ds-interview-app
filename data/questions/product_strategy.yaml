- id: prod_basic_10
  topic: Product Strategy
  theme: Engagement
  difficulty: 1
  category: "Experimentation Strategy"
  question: What is a lagging indicator? Give two examples.
  reference_answer: |
    A lagging indicator is a metric that moves or is observed after a key
    outcome or leading metric. Examples: revenue as a lagging indicator for
    new starters or growth initiatives; customer retention or churn as a
    lagging indicator for product engagement changes.
  tags:
  - lagging_indicator
  - metric
