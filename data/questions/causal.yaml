- id: causal_basic_02
  topic: Causal
  theme: Foundations
  difficulty: 1
  category: "Causal Inference"
  question: What is a confounder in one sentence?
  reference_answer: |
    In causal terms, a confounder is a variable that's related to both the
    exposure/treatment (X) and the outcome (Y). Because of that, it can create
    a spurious association or distort the real effect of X on Y. Stressing
    "correlates with Y" is good; adding "and is also related to the
    treatment/exposure" would make it complete.
  tags:
  - confounder
  - bias
